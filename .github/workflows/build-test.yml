name: Build and Test

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
      - 'copilot/*'
  workflow_dispatch:
jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Build
      shell: pwsh
      run: |
        ./src/build.ps1