name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore src/Asionyx.sln
      
    - name: Build
      run: dotnet build src/Asionyx.sln --configuration Release --no-restore
      
    - name: Run unit tests (exclude Integration)
      run: dotnet test src/Asionyx.sln --configuration Release --no-build --verbosity normal --filter "Category!=Integration"
